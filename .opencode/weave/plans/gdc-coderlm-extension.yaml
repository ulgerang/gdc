plan_name: "gdc-coderlm-extension"
project_name: "GDC 확장 전략 (CodeRLM 접근법 흡수)"
created_at: "2026-02-12"
status: "active"

vision: |
  GDC 도구를 spec-first 권위 모델을 유지하면서 CodeRLM의 코드 인덱싱 및 탐색 기능을 선택적으로 통합합니다. 
  코드는 스펙의 증거자료(supplement)로만 활용되며, 기존 워크플로우와의 완전한 하위호환성을 보장합니다.

architecture:
  core_principle: "spec-first with code evidence as supplement"
  components:
    - name: extract_context_assembler
      description: |
        gdc extract 명령에 --with-impl, --with-tests, --with-callers 옵션을 추가하여
        스펙 기반 프롬프트에 코드 컨텍스트를 선택적으로 포함합니다.
        코드 인덱스가 없는 경우에도 스펙 기반 추출은 정상 동작해야 합니다.
    - name: hybrid_parser_orchestrator
      description: |
        언어별 파서를 플러그인 방식으로 관리합니다. 
        Go는 기존 go/ast 유지, C#/TypeScript는 tree-sitter 기반 신규 파서 추가.
        각 파서는 동일한 NodeInfo 인터페이스를 구현합니다.
    - name: code_query_service
      description: |
        검색, 역추적, 심볼 조회 기능을 제공하는 선택적 서비스 레이어.
        서버 없이도 동작하며, 인덱스가 없을 때는 graceful degradation.
    - name: merge_policy_engine
      description: |
        코드-스펙 병합 시 수동 작성 필드 보존 및 해시 갱신 규칙을 관리합니다.

