      이 단계에서 생성된 테스트는 P2-P5 전체에서 회귀 테스트로 활용됩니다.
    status: "completed"
    done_when: |
      - P1 전용 테스트 픽스처 3개(C#, TypeScript, Go)가 fixtures/p1/에 생성됨
      - 기존 gdc extract 명령의 성능 기준선이 .opencode/weave/baselines/p1_baseline.json에 기록됨
      - make test-p1 명령이 0 exit code로 실행됨
      - P1 체크리스트 4개 항목이 모두 완료됨
