# GDC Project Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# 이 파일은 GDC 프로젝트의 설정을 정의합니다.
# `gdc init` 명령으로 생성되며, 필요에 따라 수정할 수 있습니다.
# ═══════════════════════════════════════════════════════════════════════════════

version: "1.0"

# ─────────────────────────────────────────────────────────────────────────────────
# 프로젝트 기본 정보
# ─────────────────────────────────────────────────────────────────────────────────
project:
  name: "GDC"                       # 프로젝트 이름
  language: "go"                    # 주 개발 언어
                                    # 지원: csharp | typescript | go | python | java
  source_dir: "internal"            # 소스 코드 루트 경로
  description: "Graph-Driven Codebase CLI Tool"   # 프로젝트 설명 (선택)

# ─────────────────────────────────────────────────────────────────────────────────
# 저장소 설정
# ─────────────────────────────────────────────────────────────────────────────────
storage:
  mode: "centralized"               # centralized: .gdc/nodes/ 아래 모든 YAML
                                    # distributed: 소스 파일 옆에 *.gdc.yaml
  nodes_dir: ".gdc/nodes"           # mode가 centralized일 때 사용

# ─────────────────────────────────────────────────────────────────────────────────
# 데이터베이스 설정
# ─────────────────────────────────────────────────────────────────────────────────
database:
  path: ".gdc/graph.db"             # SQLite DB 경로
  wal_mode: true                    # Write-Ahead Logging 활성화 (동시성 향상)

# ─────────────────────────────────────────────────────────────────────────────────
# 인덱서 설정
# ─────────────────────────────────────────────────────────────────────────────────
indexer:
  watch: false                      # 파일 감시 자동 동기화 활성화
  on_save: true                     # 파일 저장 시 자동 동기화
  ignore_patterns:                  # 무시할 파일 패턴
    - "*.test.*"
    - "**/bin/**"
    - "**/obj/**"
    - "**/node_modules/**"

# ─────────────────────────────────────────────────────────────────────────────────
# 검증 설정
# ─────────────────────────────────────────────────────────────────────────────────
validation:
  # 자동 검증 활성화
  auto_check: true
  
  # 경고로 처리할 규칙 (에러 대신)
  warn_only:
    - orphan                        # 고립된 노드
    - srp_violation                 # SRP 위반
  
  # 완전히 비활성화할 규칙
  disabled:
    - layer_violation               # 레이어 아키텍처 (필요 없으면)
  
  # SRP 위반 감지 임계값 (의존성 개수)
  srp_threshold: 5

# ─────────────────────────────────────────────────────────────────────────────────
# LLM 통합 설정
# ─────────────────────────────────────────────────────────────────────────────────
llm:
  default_model: "gpt-4"            # 기본 LLM 모델
  templates_dir: ".gdc/templates"   # 프롬프트 템플릿 디렉토리
  
  # API 키는 환경 변수로 설정 (GDC_LLM_API_KEY)
  # api_key: "${GDC_LLM_API_KEY}"
  
  # 프롬프트 생성 옵션
  prompts:
    include_logic: false            # 내부 로직 스펙 포함 여부
    max_depth: 2                    # 인접 노드 포함 깊이
    clipboard_auto: false           # 자동 클립보드 복사

# ─────────────────────────────────────────────────────────────────────────────────
# 출력 설정
# ─────────────────────────────────────────────────────────────────────────────────
output:
  color: true                       # 컬러 출력 활성화
  verbose: false                    # 상세 출력
  format: "table"                   # 기본 출력 형식: table | json | minimal

# ─────────────────────────────────────────────────────────────────────────────────
# 레이어드 아키텍처 설정 (layer_violation 검증용)
# ─────────────────────────────────────────────────────────────────────────────────
architecture:
  layers:
    - name: "presentation"
      can_depend_on: ["application"]
    - name: "application"
      can_depend_on: ["domain", "infrastructure"]
    - name: "domain"
      can_depend_on: []             # 도메인은 아무것도 의존하지 않음
    - name: "infrastructure"
      can_depend_on: ["domain"]

# ─────────────────────────────────────────────────────────────────────────────────
# 명명 규칙 (선택)
# ─────────────────────────────────────────────────────────────────────────────────
naming:
  node_id: "PascalCase"             # 노드 ID 규칙
  interface_prefix: "I"             # 인터페이스 접두사
  service_suffix: "Service"         # 서비스 접미사
