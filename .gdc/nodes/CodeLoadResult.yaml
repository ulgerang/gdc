schema_version: "1.0"
node:
    id: CodeLoadResult
    type: class
    namespace: extract
    file_path: E:\works\gdc\internal\extract\context_assembler.go
language_spec:
    language: go
    package: extract
responsibility:
    summary: ""
interface:
    properties:
        - name: PrimaryFile
          type: '*SourceFile'
          access: get; set
          description: Primary implementation file
        - name: AdditionalFiles
          type: '[]*SourceFile'
          access: get; set
          description: Additional implementation files (partial classes, extensions, etc.)
        - name: TotalLines
          type: int
          access: get; set
          description: Metadata
        - name: Language
          type: string
          access: get; set
        - name: FoundBy
          type: string
          access: get; set
          description: '"index", "filesystem", "heuristic"'
        - name: LoadTime
          type: time.Duration
          access: get; set
metadata:
    status: ""
