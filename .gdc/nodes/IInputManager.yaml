# ═══════════════════════════════════════════════════════════════════════════════
# Example Node: IInputManager (Interface)
# GDC Node Specification
# ═══════════════════════════════════════════════════════════════════════════════

schema_version: "1.0"

# ─────────────────────────────────────────────────────────────────────────────────
# 노드 기본 정보
# ─────────────────────────────────────────────────────────────────────────────────
node:
  id: "IInputManager"
  type: "interface"
  layer: "application"
  namespace: "Game.Input"

# ─────────────────────────────────────────────────────────────────────────────────
# 책임 정의
# ─────────────────────────────────────────────────────────────────────────────────
responsibility:
  summary: "입력 장치 추상화 인터페이스"
  details: |
    다양한 입력 장치(키보드, 게임패드, 터치스크린)를 
    통일된 인터페이스로 추상화합니다.
    
    이를 통해 상위 레이어는 구체적인 입력 장치에 
    의존하지 않고 게임 로직을 구현할 수 있습니다.

# ─────────────────────────────────────────────────────────────────────────────────
# 인터페이스 정의
# ─────────────────────────────────────────────────────────────────────────────────
interface:
  methods:
    - name: "GetMovementAxis"
      signature: "Vector2 GetMovementAxis()"
      description: "정규화된 이동 축 벡터를 반환합니다."
      returns:
        type: "Vector2"
        description: "이동 방향 벡터"
        constraint: "magnitude <= 1.0"
    
    - name: "IsActionPressed"
      signature: "bool IsActionPressed(string actionName)"
      description: "지정된 액션 버튼이 현재 눌려있는지 확인합니다."
      parameters:
        - name: "actionName"
          type: "string"
          description: "확인할 액션 이름"
          examples: ["Jump", "Attack", "Interact", "Sprint"]
      returns:
        type: "bool"
        description: "버튼이 눌려있으면 true"
    
    - name: "IsActionJustPressed"
      signature: "bool IsActionJustPressed(string actionName)"
      description: "지정된 액션이 이번 프레임에 처음 눌렸는지 확인합니다."
      parameters:
        - name: "actionName"
          type: "string"
      returns:
        type: "bool"
        description: "이번 프레임에 눌렸으면 true"
    
    - name: "IsActionJustReleased"
      signature: "bool IsActionJustReleased(string actionName)"
      description: "지정된 액션이 이번 프레임에 떼어졌는지 확인합니다."
      parameters:
        - name: "actionName"
          type: "string"
      returns:
        type: "bool"
    
    - name: "GetActionStrength"
      signature: "float GetActionStrength(string actionName)"
      description: "액션의 아날로그 강도를 반환합니다 (트리거 등)."
      parameters:
        - name: "actionName"
          type: "string"
      returns:
        type: "float"
        constraint: "0.0 <= value <= 1.0"

# ─────────────────────────────────────────────────────────────────────────────────
# 이 인터페이스의 구현체 목록 (참고용)
# ─────────────────────────────────────────────────────────────────────────────────
implementations:
  - "KeyboardInputManager"
  - "GamepadInputManager"
  - "MobileInputManager"

# ─────────────────────────────────────────────────────────────────────────────────
# 메타데이터
# ─────────────────────────────────────────────────────────────────────────────────
metadata:
